services:
  backend:
    build: ./backend
    ports:
      - "8001:8000"
      - "50051:50051"
    environment:
      - DB_PATH=/app/data/book_simulator.db
      - ITICK_TOKEN=${ITICK_TOKEN:-}
      - INITIAL_FUND=${INITIAL_FUND:-10000}
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - LOG_DIR=/app/logs
    volumes:
      - ./backend_data:/app/data
      - ./backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.socket(); s.connect(('localhost',50051)); s.close()"]
      interval: 2s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  web:
    build: ./web
    ports:
      - "5174:5173"
    environment:
      - VITE_BACKEND_URL=http://backend:8000
    volumes:
      - ./web/src:/app/src
      - ./web/public:/app/public
      - ./web/index.html:/app/index.html
      - ./web/vite.config.ts:/app/vite.config.ts
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  grpcui:
    image: fullstorydev/grpcui:latest
    ports:
      - "8082:8080"
    volumes:
      - ./proto:/proto:ro
    command:
      - "-plaintext"
      - "-proto"
      - "/proto/trading/trading.proto"
      - "-import-path"
      - "/proto/trading"
      - "-import-path"
      - "/proto"
      - "-bind"
      - "0.0.0.0"
      - "-port"
      - "8080"
      - "backend:50051"
    depends_on:
      backend:
        condition: service_healthy
